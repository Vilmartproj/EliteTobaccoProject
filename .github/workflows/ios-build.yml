name: iOS Build

on:
  push:
    branches: [ "Elite_Mobile" ]
  pull_request:
    branches: [ "Elite_Mobile" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (optional)
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install Node (if you use JS tooling)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS dependencies for app (try fast, fallback to reinstall)
        run: |
          set -e
          ROOT="$GITHUB_WORKSPACE/tobacco-app 3"
          echo "Attempting fast install in $ROOT (no optional deps)"
          if npm ci --no-optional --prefix "$ROOT"; then
            echo "npm ci succeeded"
          else
            echo "npm ci failed — removing node_modules and package-lock.json and retrying with npm i"
            rm -rf "$ROOT/node_modules" "$ROOT/package-lock.json"
            npm i --prefix "$ROOT"
          fi
        # If you use yarn/pnpm, tell me and I’ll adjust

      - name: Build web assets and sync to iOS
        run: |
          ROOT="$GITHUB_WORKSPACE/tobacco-app 3"
          echo "ROOT=$ROOT"
          cd "$ROOT"
          npm run ios:build

      - name: Install CocoaPods (if Podfile exists in project)
        run: |
          ROOT="$GITHUB_WORKSPACE/tobacco-app 3"
          echo "ROOT=$ROOT"
          if [ -f "$ROOT/ios/App/Podfile" ]; then
            cd "$ROOT/ios/App"
            pod install
          else
            echo "No ios/App/Podfile found at $ROOT/ios/App/Podfile; skipping pods"
          fi

      - name: Upload ios/App directory for debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-tree
          path: |
            "tobacco-app 3/ios/App"

      # ---- Configure these 2 values for your repo ----
      - name: Build (Simulator)
        run: |
          ROOT="$GITHUB_WORKSPACE/tobacco-app 3"
          echo "ROOT=$ROOT"
          WORKSPACE="$ROOT/ios/App/App.xcworkspace"
          PROJECT="$ROOT/ios/App/App.xcodeproj"
          SCHEME="App"

          echo "Checking for workspace/project at: $WORKSPACE or $PROJECT"
          ls -la "$ROOT/ios" || true

          if [ -d "$WORKSPACE" ]; then
            # choose the first available iPhone simulator dynamically (fallback to iPad)
            DEST=""
            # parse human-readable simctl output: look for lines starting with whitespace + device name
            FIRST_IPHONE_LINE=$(xcrun simctl list devices available | grep -E '^[[:space:]]*iPhone' | head -n1 || true)
            if [ -n "$FIRST_IPHONE_LINE" ]; then
              # extract name up to the first ' (' and trim
              NAME=$(echo "$FIRST_IPHONE_LINE" | sed -E 's/^[[:space:]]*([^\(]+)\(.*/\1/' | sed 's/[[:space:]]*$//')
              DEST="platform=iOS Simulator,name=$NAME"
            else
              # fallback to any iPad simulator
              FIRST_IPAD_LINE=$(xcrun simctl list devices available | grep -E '^[[:space:]]*iPad' | head -n1 || true)
              if [ -n "$FIRST_IPAD_LINE" ]; then
                NAME=$(echo "$FIRST_IPAD_LINE" | sed -E 's/^[[:space:]]*([^\(]+)\(.*/\1/' | sed 's/[[:space:]]*$//')
                DEST="platform=iOS Simulator,name=$NAME"
              fi
            fi
            if [ -z "$DEST" ]; then
              echo "No suitable iOS Simulator found on runner. Listing available devices:";
              xcrun simctl list devices
              exit 1
            fi
            echo "Using simulator destination: $DEST"
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination "$DEST" \
              -derivedDataPath build \
              clean build
          elif [ -d "$PROJECT" ]; then
            # choose the first available iPhone simulator dynamically (fallback to iPad)
            DEST=""
            FIRST_IPHONE_LINE=$(xcrun simctl list devices available | grep -E '^[[:space:]]*iPhone' | head -n1 || true)
            if [ -n "$FIRST_IPHONE_LINE" ]; then
              NAME=$(echo "$FIRST_IPHONE_LINE" | sed -E 's/^[[:space:]]*([^\(]+)\(.*/\1/' | sed 's/[[:space:]]*$//')
              DEST="platform=iOS Simulator,name=$NAME"
            else
              FIRST_IPAD_LINE=$(xcrun simctl list devices available | grep -E '^[[:space:]]*iPad' | head -n1 || true)
              if [ -n "$FIRST_IPAD_LINE" ]; then
                NAME=$(echo "$FIRST_IPAD_LINE" | sed -E 's/^[[:space:]]*([^\(]+)\(.*/\1/' | sed 's/[[:space:]]*$//')
                DEST="platform=iOS Simulator,name=$NAME"
              fi
            fi
            if [ -z "$DEST" ]; then
              echo "No suitable iOS Simulator found on runner. Listing available devices:";
              xcrun simctl list devices
              exit 1
            fi
            echo "Using simulator destination: $DEST"
            xcodebuild \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination "$DEST" \
              -derivedDataPath build \
              clean build
          else
            echo "No .xcworkspace or .xcodeproj found at expected paths. Listing $ROOT/ios/App contents for debugging:";
            ls -la "$ROOT/ios/App" || true
            exit 1
          fi

      - name: Upload build artifacts (DerivedData)
        uses: actions/upload-artifact@v4
        with:
          name: ios-deriveddata
          path: build

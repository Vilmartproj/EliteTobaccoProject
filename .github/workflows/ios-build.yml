name: iOS Build

on:
  push:
    branches: [ "Elite_Mobile" ]
  pull_request:
    branches: [ "Elite_Mobile" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (optional)
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install Node (if you use JS tooling)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS dependencies (if needed)
        run: npm ci
        # If you use yarn/pnpm, tell me and I’ll adjust

      - name: Install CocoaPods (if Podfile exists in project)
        run: |
          # Work from the webapp folder where iOS lives
          if [ -d "tobacco-app 3" ]; then
            cd "tobacco-app 3"
          fi
          if [ -f "ios/App/Podfile" ]; then
            cd ios/App
            pod install
          else
            echo "No ios/App/Podfile found; skipping pods"
          fi

      - name: Upload ios/App directory for debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-tree
          path: |
            "tobacco-app 3/ios/App"

      # ---- Configure these 2 values for your repo ----
      - name: Build (Simulator)
        run: |
          # Work from webapp folder if present
          if [ -d "tobacco-app 3" ]; then
            cd "tobacco-app 3"
          fi

          # Set these to your actual workspace/project + scheme for this repo
          WORKSPACE="tobacco-app 3/ios/App/App.xcworkspace"
          PROJECT="tobacco-app 3/ios/App/App.xcodeproj"
          SCHEME="App"

          echo "Checking for workspace/project at: $WORKSPACE or $PROJECT"
          ls -la ios || true

          if [ -d "$WORKSPACE" ]; then
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,name=iPhone 15' \
              -derivedDataPath build \
              clean build
          elif [ -d "$PROJECT" ]; then
            xcodebuild \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,name=iPhone 15' \
              -derivedDataPath build \
              clean build
          else
            echo "No .xcworkspace or .xcodeproj found at expected paths. Listing ios/App contents for debugging:";
            ls -la ios/App || true
            exit 1
          fi

      - name: Upload build artifacts (DerivedData)
        uses: actions/upload-artifact@v4
        with:
          name: ios-deriveddata
          path: build

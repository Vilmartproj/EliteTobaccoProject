name: iOS Build

on:
  push:
    branches: [ "Elite_Mobile" ]
  pull_request:
    branches: [ "Elite_Mobile" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (optional)
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install Node (if you use JS tooling)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS dependencies for app (try npm, fallback to pnpm)
        run: |
          set -e
          ROOT="$GITHUB_WORKSPACE/tobacco-app 3"
          echo "Runner arch: $(uname -m)"
          echo "Node: $(node -v) npm: $(npm -v)"
          echo "Attempting npm ci --no-optional in $ROOT"
          if npm ci --no-optional --prefix "$ROOT"; then
            echo "npm ci --no-optional succeeded"
            exit 0
          fi

          echo "npm ci failed — trying remove lockfile and full npm i"
          rm -rf "$ROOT/node_modules" "$ROOT/package-lock.json"
          if npm i --prefix "$ROOT" --no-optional; then
            echo "npm i --no-optional succeeded"
            exit 0
          fi

          echo "npm install attempts failed — falling back to pnpm (via corepack)"
          corepack enable || true
          corepack prepare pnpm@7.28.0 --activate || true
          if pnpm install --prefix "$ROOT" --no-optional; then
            echo "pnpm install succeeded"
            exit 0
          fi

          echo "All installer attempts failed; printing $ROOT tree for debugging"
          ls -la "$ROOT" || true
          ls -la "$ROOT/node_modules" || true
          exit 1
        # If you use yarn, let me know and I'll adapt to yarn

      - name: Debug JS install (list rollup files and try require)
        run: |
          ROOT="$GITHUB_WORKSPACE/tobacco-app 3"
          echo "Inspecting $ROOT/node_modules"
          echo "-- Node/npm info --"
          node -v || true
          npm -v || true
          echo "-- rollup listing --"
          ls -la "$ROOT/node_modules/rollup" || true
          ls -la "$ROOT/node_modules/@rollup" || true
          echo "-- npm ls rollup --"
          npm --prefix "$ROOT" ls rollup --depth=0 || true
          echo "-- attempt to require rollup/dist/native (non-fatal) --"
          node <<'NODE'
          try {
            console.log('resolve:', require.resolve('rollup'));
            const n = require('rollup/dist/native');
            console.log('native loaded:', Object.keys(n).slice(0,10));
          } catch (e) {
            console.error('require error:', e && e.stack ? e.stack : e);
          }
          NODE
          echo "-- end debug --"

      - name: Install rollup native optional package if missing
        run: |
          ROOT="$GITHUB_WORKSPACE/tobacco-app 3"
          echo "Checking rollup native availability"
          if node -e "try{require('rollup/dist/native'); console.log('rollup native ok');}catch(e){process.exit(1)}"; then
            echo "rollup native already available"
          else
            PLATFORM=$(uname -s | tr '[:upper:]' '[:lower:]')
            ARCH=$(uname -m)
            if [ "$ARCH" = "x86_64" ]; then ARCH="x64"; fi
            PKG="@rollup/rollup-${PLATFORM}-${ARCH}"
            echo "Attempting to install optional native package: $PKG into $ROOT"
            npm i --prefix "$ROOT" "$PKG" --no-save || true
            echo "Listing @rollup entries after install:"
            ls -la "$ROOT/node_modules/@rollup" || true
          fi

      - name: Build web assets and sync to iOS
        run: |
          ROOT="$GITHUB_WORKSPACE/tobacco-app 3"
          echo "ROOT=$ROOT"
          cd "$ROOT"
          npm run ios:build

      - name: Install CocoaPods (if Podfile exists in project)
        run: |
          ROOT="$GITHUB_WORKSPACE/tobacco-app 3"
          echo "ROOT=$ROOT"
          if [ -f "$ROOT/ios/App/Podfile" ]; then
            cd "$ROOT/ios/App"
            pod install
          else
            echo "No ios/App/Podfile found at $ROOT/ios/App/Podfile; skipping pods"
          fi

      - name: Upload ios/App directory for debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-tree
          path: |
            "tobacco-app 3/ios/App"

      # ---- Configure these 2 values for your repo ----
      - name: Build (Simulator)
        run: |
          ROOT="$GITHUB_WORKSPACE/tobacco-app 3"
          echo "ROOT=$ROOT"
          WORKSPACE="$ROOT/ios/App/App.xcworkspace"
          PROJECT="$ROOT/ios/App/App.xcodeproj"
          SCHEME="App"

          echo "Checking for workspace/project at: $WORKSPACE or $PROJECT"
          ls -la "$ROOT/ios" || true

          if [ -d "$WORKSPACE" ]; then
            # choose the first available iPhone simulator dynamically (fallback to iPad)
            DEST=""
            # parse human-readable simctl output: look for lines starting with whitespace + device name
            FIRST_IPHONE_LINE=$(xcrun simctl list devices available | grep -E '^[[:space:]]*iPhone' | head -n1 || true)
            if [ -n "$FIRST_IPHONE_LINE" ]; then
              # extract name up to the first ' (' and trim
              NAME=$(echo "$FIRST_IPHONE_LINE" | sed -E 's/^[[:space:]]*([^\(]+)\(.*/\1/' | sed 's/[[:space:]]*$//')
              DEST="platform=iOS Simulator,name=$NAME"
            else
              # fallback to any iPad simulator
              FIRST_IPAD_LINE=$(xcrun simctl list devices available | grep -E '^[[:space:]]*iPad' | head -n1 || true)
              if [ -n "$FIRST_IPAD_LINE" ]; then
                NAME=$(echo "$FIRST_IPAD_LINE" | sed -E 's/^[[:space:]]*([^\(]+)\(.*/\1/' | sed 's/[[:space:]]*$//')
                DEST="platform=iOS Simulator,name=$NAME"
              fi
            fi
            if [ -z "$DEST" ]; then
              echo "No suitable iOS Simulator found on runner. Listing available devices:";
              xcrun simctl list devices
              exit 1
            fi
            echo "Using simulator destination: $DEST"
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination "$DEST" \
              -derivedDataPath build \
              clean build
          elif [ -d "$PROJECT" ]; then
            # choose the first available iPhone simulator dynamically (fallback to iPad)
            DEST=""
            FIRST_IPHONE_LINE=$(xcrun simctl list devices available | grep -E '^[[:space:]]*iPhone' | head -n1 || true)
            if [ -n "$FIRST_IPHONE_LINE" ]; then
              NAME=$(echo "$FIRST_IPHONE_LINE" | sed -E 's/^[[:space:]]*([^\(]+)\(.*/\1/' | sed 's/[[:space:]]*$//')
              DEST="platform=iOS Simulator,name=$NAME"
            else
              FIRST_IPAD_LINE=$(xcrun simctl list devices available | grep -E '^[[:space:]]*iPad' | head -n1 || true)
              if [ -n "$FIRST_IPAD_LINE" ]; then
                NAME=$(echo "$FIRST_IPAD_LINE" | sed -E 's/^[[:space:]]*([^\(]+)\(.*/\1/' | sed 's/[[:space:]]*$//')
                DEST="platform=iOS Simulator,name=$NAME"
              fi
            fi
            if [ -z "$DEST" ]; then
              echo "No suitable iOS Simulator found on runner. Listing available devices:";
              xcrun simctl list devices
              exit 1
            fi
            echo "Using simulator destination: $DEST"
            xcodebuild \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination "$DEST" \
              -derivedDataPath build \
              clean build
          else
            echo "No .xcworkspace or .xcodeproj found at expected paths. Listing $ROOT/ios/App contents for debugging:";
            ls -la "$ROOT/ios/App" || true
            exit 1
          fi

      - name: Upload build artifacts (DerivedData)
        uses: actions/upload-artifact@v4
        with:
          name: ios-deriveddata
          path: build

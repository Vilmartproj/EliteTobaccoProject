<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Elite Leaf Tobacco Company logo</title>
  <desc id="desc">Circular logo with Elite Leaf branding and a tobacco leaf in the center.</desc>
  <defs>
    <linearGradient id="goldRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="navyBand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="leafFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <path id="topArc" d="M 115 191 A 170 170 0 0 1 397 191"/>
    <path id="bottomArc" d="M 123 321 A 160 160 0 0 0 389 321"/>
  </defs>
  <circle cx="256" cy="256" r="236" fill="#fff8e7"/>
  <circle cx="256" cy="256" r="228" fill="none" stroke="url(#goldRing)" stroke-width="10"/>
  <circle cx="256" cy="256" r="209" fill="#07111d"/>
  <circle cx="256" cy="256" r="167" fill="#18324d"/>
  <circle cx="256" cy="256" r="146" fill="#f8f1c8" stroke="#26455f" stroke-width="12"/>
  <path d="M 78 228 H 164 V 284 H 78 A 178 178 0 0 1 78 228 Z" fill="#18324d"/>
  <path d="M 434 228 H 348 V 284 H 434 A 178 178 0 0 0 434 228 Z" fill="#18324d"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="6">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">ELITE LEAF</textPath>
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="32" fill="#18324d" letter-spacing="3">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">TOBACCO COMPANY</textPath>
  </text>
  <g filter="url(#shadow)">
    <path d="M 183 318 C 212 259 268 219 343 219 C 339 250 321 281 285 309 C 254 332 214 341 183 318 Z" fill="url(#leafFill)" stroke="#c26a0d" stroke-width="4" stroke-linejoin="round"/>
    <path d="M 195 312 C 223 293 250 276 329 230" fill="none" stroke="#a35713" stroke-width="4" stroke-linecap="round"/>
    <path d="M 228 290 C 222 272 221 256 223 239" fill="none" stroke="#bf7a18" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 256 305 C 256 284 260 263 271 242" fill="none" stroke="#bf7a18" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 286 310 C 293 288 305 269 321 253" fill="none" stroke="#bf7a18" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>